version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # @types/node tracks the Node major; keep it pinned to our runtime (24)
      # rather than chasing the current/odd Node line.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      duckdb:
        patterns:
          - "@duckdb/*"
      toolchain:
        patterns:
          - "gts"
          - "typescript"
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
          - "prettier"
        update-types:
          - "major"
      minor-and-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "@duckdb/*"
        update-types:
          - "minor"
          - "patch"
