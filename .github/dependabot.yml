version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      duckdb:
        patterns:
          - "@duckdb/*"
      minor-and-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "@duckdb/*"
        update-types:
          - "minor"
          - "patch"
